<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>아빠모드 - 퇴근길 3분 전환 루틴</title>
    <meta
      name="description"
      content="퇴근길 3분 동안 회사의 긴장을 내려놓고 가족에게 따뜻한 아빠로 돌아가도록 돕는 Android 앱"
    />
    <meta property="og:title" content="아빠모드" />
    <meta property="og:description" content="퇴근길 3분 전환 루틴으로 가족에게 따뜻하게 돌아가기" />
    <meta property="og:image" content="assets/social-card.png" />
    <link rel="icon" type="image/png" href="assets/favicon.png" />
    <link rel="apple-touch-icon" href="assets/favicon-192.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <section class="hero">
        <img class="hero-image" src="assets/landing-hero.png" alt="퇴근길 호흡으로 아빠모드로 전환하는 모습" />
        <div class="hero-copy">
          <img class="app-icon" src="assets/icon-512.png" alt="" />
          <p class="eyebrow">퇴근길 3분 전환 루틴</p>
          <h1>아빠모드</h1>
          <p class="lead">
            회사의 긴장을 문 밖에 내려놓고, 아내와 아이에게 웃어줄 준비를 합니다.
          </p>
        </div>
      </section>

      <section class="content">
        <div>
          <h2>집에 들어가기 전, 작은 순서 하나</h2>
          <p>
            스트레스 점검, 3분 호흡, 따뜻한 첫마디, 오늘의 가족 행동을 한 흐름으로 이어
            퇴근 후의 마음 전환을 도와줍니다.
          </p>
        </div>
        <ul class="features">
          <li><strong>기분 점검</strong><span>몸과 마음 상태를 짧게 기록합니다.</span></li>
          <li><strong>호흡 루틴</strong><span>집 문 앞에서 긴장을 낮춥니다.</span></li>
          <li><strong>사랑 한마디</strong><span>가족에게 건넬 말을 미리 고릅니다.</span></li>
          <li><strong>아빠 행동</strong><span>작고 구체적인 실천을 남깁니다.</span></li>
        </ul>
      </section>
    </main>
  </body>
</html>
